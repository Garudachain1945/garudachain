# garudad.conf — GarudaChain seed node configuration
# Place at: ~/.garudachain/garudad.conf  (or -conf=/path/to/this/file)
#
# This configuration is optimised for a permanent seed node:
# - Maximum inbound connections
# - No wallet (pure full node)
# - RPC bound to localhost only
# - No transaction index (saves disk)

# ── Network ────────────────────────────────────────────────────────────────
listen=1
discover=1
dnsseed=1

# Replace with this server's public IP so peers can connect back
externalip=REPLACE_WITH_SERVER_PUBLIC_IP

# Allow up to 125 inbound connections (default is 125 total)
maxconnections=125

# ── RPC (localhost only — used by garuda-seeder healthcheck) ──────────────
server=1
rpcuser=garudaseed
rpcpassword=REPLACE_WITH_STRONG_PASSWORD
rpcbind=127.0.0.1
rpcport=6301
rpcallowip=127.0.0.1

# ── Storage ────────────────────────────────────────────────────────────────
# No wallet needed on a seed node
disablewallet=1

# No txindex — saves significant disk space on a seed node
txindex=0

# Pruning: 0 = keep full chain (recommended for seed nodes)
# Set to e.g. 5000 (MB) if disk is limited
prune=0

# Increase dbcache for faster IBD (initial block download)
dbcache=512

# ── Logging ───────────────────────────────────────────────────────────────
# Uncomment to enable detailed P2P logging during initial setup
# debug=net
# debug=addrman
