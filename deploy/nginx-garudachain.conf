# nginx reverse proxy for GarudaChain
#
# This config terminates TLS, enforces HTTPS, rate-limits request classes,
# and forwards to the local garudaapi on 127.0.0.1:5000. garudaapi itself
# is bound to localhost only (GARUDA_BIND=127.0.0.1) — nginx is the ONLY
# path from the public internet into the API.
#
# Install:
#   1. Copy this to /etc/nginx/sites-available/garudachain
#   2. ln -s ../sites-available/garudachain /etc/nginx/sites-enabled/
#   3. certbot --nginx -d api.garudachain.org  (letsencrypt)
#   4. nginx -t && systemctl reload nginx
#
# You must replace:
#   api.garudachain.org  → your real domain
#   /etc/letsencrypt/...→ your real cert paths after certbot runs

# ── Rate limit zones (shared across workers) ────────────────────────────
# Each zone is keyed by client IP and stores up to 10 MiB of state
# (~160k unique IPs). Adjust `rate=` per traffic expectation.

limit_req_zone $binary_remote_addr zone=garuda_read:10m  rate=60r/s;
limit_req_zone $binary_remote_addr zone=garuda_write:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=garuda_admin:10m rate=1r/s;

# Connection limit per IP
limit_conn_zone $binary_remote_addr zone=garuda_conn:10m;

# Cache zone for the read-heavy endpoints that don't change often
proxy_cache_path /var/cache/nginx/garuda levels=1:2 keys_zone=garuda_cache:50m
                 max_size=500m inactive=5m use_temp_path=off;

# ── HTTP → HTTPS redirect ───────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.garudachain.org;

    # Allow ACME challenges through so certbot renewal works
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS + reverse proxy ───────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.garudachain.org;

    # ── TLS (certbot manages these) ────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.garudachain.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.garudachain.org/privkey.pem;

    # Modern cipher suite (Mozilla Intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:GarudaSSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout 5s;

    # HSTS — commit to HTTPS for 2 years, include subdomains
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Defense headers (garudaapi sets these too — belt + suspenders)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Hide nginx version from error pages + Server header
    server_tokens off;

    # ── Request body cap (matches garudaapi's internal cap) ────────────
    client_max_body_size 1m;
    client_body_timeout 15s;
    client_header_timeout 15s;

    # Global connection cap per IP
    limit_conn garuda_conn 20;

    # ── Admin endpoints: very tight limit + optional IP allowlist ──────
    # Uncomment the `allow`/`deny` lines to lock down to known operator IPs.
    location ~ ^/api/dex/qris/(confirm|pending) {
        # allow 203.0.113.10;   # operator VPN exit
        # deny all;
        limit_req zone=garuda_admin burst=3 nodelay;

        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Mint/burn — tight limit, short body, fail fast ─────────────────
    location ~ ^/api/cbdc/(mint|burn|issue) {
        limit_req zone=garuda_admin burst=2 nodelay;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Write endpoints (swap, order, presale buy, withdraw) ───────────
    location ~ ^/api/dex/(swap|order|oracle-swap|cross-swap|presale|withdraw|deposit|order/cancel|order/prepare) {
        limit_req zone=garuda_write burst=20 nodelay;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Read endpoints (default) — cached briefly to absorb spikes ─────
    location /api/ {
        limit_req zone=garuda_read burst=120 nodelay;

        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache garuda_cache;
        proxy_cache_methods GET HEAD;
        proxy_cache_valid 200 3s;   # short TTL — trade vs live-price freshness
        proxy_cache_valid 404 30s;
        proxy_cache_lock on;
        proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
        add_header X-Cache-Status $upstream_cache_status always;

        proxy_read_timeout 15s;
    }

    # ── Explicit block of everything else ──────────────────────────────
    location / {
        return 404;
    }

    # ── Access log: JSON format for log ingest ─────────────────────────
    access_log /var/log/nginx/garudachain-access.log combined;
    error_log  /var/log/nginx/garudachain-error.log warn;
}
