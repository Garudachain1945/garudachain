kind = "web"
previewPath = "/"
title = "GarudaChain Explorer"
version = "1.0.0"
id = "artifacts/garudachain-explorer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25360

[services.development]
run = "pnpm --filter @workspace/garudachain-explorer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/garudachain-explorer", "run", "build" ]
publicDir = "artifacts/garudachain-explorer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25360"
BASE_PATH = "/"
